<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}Portal{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/extras.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/web.css') }}">

    <style>
      .ff-portal-shell {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 22px 32px;
      }

      .ff-portal-nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }

      .ff-portal-nav__item {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid var(--ff-border);
        background: rgba(255, 255, 255, .6);
        font-weight: 600;
        color: var(--ff-muted);
      }

      .ff-portal-nav__item.is-active {
        color: var(--ff-primary);
        border-color: rgba(91, 82, 182, .26);
        background: rgba(91, 82, 182, .08);
      }

      .ff-portal-kpis {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
      }

      .ff-portal-kpi {
        border: 1px solid rgba(91, 82, 182, .14);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(91, 82, 182, .08), rgba(255, 255, 255, .95));
        padding: 14px;
      }

      .ff-portal-kpi__label {
        margin: 0;
        font-size: 13px;
        color: var(--ff-muted);
        font-weight: 600;
      }

      .ff-portal-kpi__value {
        margin: 8px 0 0;
        font-size: 28px;
        font-weight: 700;
        color: var(--ff-primary);
      }

      .ff-portal-home-grid {
        display: grid;
        gap: 14px;
        margin-top: 14px;
        align-items: start;
      }

      .ff-portal-home-grid--primary {
        grid-template-columns: minmax(0, 1.9fr) minmax(320px, 1fr);
      }

      .ff-portal-home-grid--secondary {
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      }

      .ff-portal-table-card {
        padding-top: 10px;
      }

      .ff-portal-table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--ff-border);
        border-radius: 12px;
      }

      .ff-portal-table {
        width: 100%;
        border-collapse: collapse;
        min-width: 680px;
      }

      .ff-portal-table th,
      .ff-portal-table td {
        padding: 12px 14px;
        border-bottom: 1px solid var(--ff-border);
        text-align: left;
        vertical-align: middle;
      }

      .ff-portal-table th {
        background: rgba(91, 82, 182, .06);
        color: var(--ff-title);
        font-size: 13px;
        font-weight: 700;
      }

      .ff-portal-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .ff-portal-row-leading-icon {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(91, 82, 182, .12);
        color: var(--ff-primary);
        margin-right: 10px;
      }

      .ff-portal-badge {
        display: inline-flex;
        align-items: center;
        font-size: 11px;
        border-radius: 999px;
        padding: 2px 8px;
        margin-left: 8px;
        font-weight: 700;
      }

      .ff-portal-badge--danger {
        color: #b42318;
        background: rgba(180, 35, 24, .12);
      }

      .ff-portal-table-note {
        margin: 10px 0 0;
        font-size: 12px;
        color: var(--ff-muted);
      }

      .ff-portal-activity-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .ff-portal-activity-head__count {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 28px;
        height: 28px;
        padding: 0 8px;
        border-radius: 999px;
        background: rgba(91, 82, 182, .12);
        color: var(--ff-primary);
        font-size: 12px;
        font-weight: 700;
      }

      .ff-portal-activity-item__link {
        font-weight: 600;
        color: var(--ff-title);
        text-decoration: none;
      }

      .ff-portal-activity-item__link:hover {
        color: var(--ff-primary);
      }

      @media (max-width: 960px) {
        .ff-portal-home-grid--primary,
        .ff-portal-home-grid--secondary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="ff-main">
      <div class="ff-blob"></div>
      <div class="ff-topbar">
        <div class="ff-page-title">
          <h1>Portal del cliente</h1>
        </div>
      </div>

      <main class="ff-content ff-portal-shell">
        <nav class="ff-portal-nav">
          <a class="ff-portal-nav__item{% if request.path == '/portal' %} is-active{% endif %}" href="/portal">Inicio</a>
          <a class="ff-portal-nav__item{% if request.path.startswith('/portal/profile') %} is-active{% endif %}" href="/portal/profile">Mi perfil</a>
          <a class="ff-portal-nav__item{% if request.path.startswith('/portal/documents') %} is-active{% endif %}" href="/portal/documents">Mis documentos</a>
          <a class="ff-portal-nav__item{% if request.path.startswith('/portal/cases') %} is-active{% endif %}" href="/portal/cases">Mis expedientes</a>
          <a class="ff-portal-nav__item{% if request.path.startswith('/portal/companies') %} is-active{% endif %}" href="/portal/companies">Mis empresas</a>
          <a class="ff-portal-nav__item{% if request.path.startswith('/portal/requests') %} is-active{% endif %}" href="/portal/requests">Mis solicitudes</a>
          <a class="ff-portal-nav__item{% if request.path.startswith('/portal/notifications') %} is-active{% endif %}" href="/portal/notifications">Avisos</a>
        </nav>
        {% block content %}{% endblock %}
      </main>

      <footer class="ff-footer">© {{ current_year }} · Gestium</footer>
    </div>
  </body>
</html>
