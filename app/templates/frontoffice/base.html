<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}Portal{% endblock %}</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; }
      nav { background: #1f2937; color: #fff; padding: 12px 20px; }
      nav a { color: #fff; margin-right: 12px; text-decoration: none; }
      main { max-width: 980px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 8px; }
      .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .card { background: #eef2ff; padding: 12px; border-radius: 8px; }
      table { width: 100%; border-collapse: collapse; margin-top: 14px; }
      th, td { text-align: left; border-bottom: 1px solid #ddd; padding: 8px; }
    </style>
  </head>
  <body>
    <nav>
      <a href="/portal">Inicio</a>
      <a href="/portal/profile">Mi perfil</a>
      <a href="/portal/documents">Mis documentos</a>
      <a href="/portal/cases">Mis expedientes</a>
      <a href="/portal/companies">Mis empresas</a>
    </nav>
    <main>{% block content %}{% endblock %}</main>
  </body>
</html>
